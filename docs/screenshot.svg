<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" width="460" height="460" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#d6d6d6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cececd"/>
      <stop offset="1" stop-color="#e9e9e8"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7bc62d"/>
      <stop offset="1" stop-color="#c6f24a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="460" height="460" fill="url(#bg)"/>

  <!-- device body -->
  <rect x="30" y="30" width="400" height="400" rx="20" fill="url(#panel)" stroke="#bcbcbc" stroke-width="1"/>

  <!-- header -->
  <text x="60" y="72" font-size="15" letter-spacing="2" fill="#666" font-weight="700">LARA</text>
  <text x="400" y="72" font-size="11" fill="#8a8a8a" font-style="italic" text-anchor="end" letter-spacing="1">ELKO</text>

  <!-- left controls -->
  <g fill="#444">
    <g transform="translate(66,120)"><path d="M0 3 L6 3 L12 -3 L12 15 L6 9 L0 9 Z"/><path d="M15 0 a6 6 0 0 1 0 12" fill="none" stroke="#444" stroke-width="2"/></g>
    <g transform="translate(66,168)" stroke="#444" stroke-width="2.5" fill="none"><path d="M6 -4 L6 6"/><path d="M0 -1 a8 8 0 1 0 12 0"/></g>
    <g transform="translate(66,218)"><rect x="0" y="0" width="4" height="16" rx="1"/><rect x="8" y="0" width="4" height="16" rx="1"/></g>
    <g transform="translate(65,266)" stroke="#444" stroke-width="1.6" fill="none"><circle cx="7" cy="7" r="3"/><path d="M7 -1 v-3 M7 18 v-3 M-1 7 h-3 M18 7 h-3 M1.5 1.5 l-2 -2 M14.5 14.5 l2 2 M12.5 1.5 l2 -2 M-0.5 14.5 l-2 2"/></g>
  </g>

  <!-- right controls -->
  <g fill="#444">
    <g transform="translate(388,150)"><path d="M0 3 L6 3 L12 -3 L12 15 L6 9 L0 9 Z"/><path d="M15 0 a6 6 0 0 1 0 12 M18 -3 a10 10 0 0 1 0 18" fill="none" stroke="#444" stroke-width="2"/></g>
    <g transform="translate(388,214)"><path d="M0 3 L6 3 L12 -3 L12 15 L6 9 L0 9 Z"/><path d="M15 0 a6 6 0 0 1 0 12" fill="none" stroke="#444" stroke-width="2"/></g>
  </g>

  <!-- OLED display -->
  <rect x="140" y="88" width="205" height="248" rx="5" fill="#060a06"/>
  <g>
    <!-- date / time -->
    <text x="150" y="112" font-size="13" font-weight="700" fill="#f0b000">13.07.2026</text>
    <text x="335" y="112" font-size="13" font-weight="700" fill="#f0b000" text-anchor="end">20:32</text>
    <!-- station label -->
    <text x="150" y="132" font-size="10" fill="#3b9edb" letter-spacing="1">STANICE:</text>
    <text x="150" y="152" font-size="16" font-weight="700" fill="#f6f6f6">EVROPA 2 - RADIO</text>
    <!-- now playing label -->
    <text x="150" y="172" font-size="10" fill="#3b9edb" letter-spacing="1">PRÁVĚ HRAJE:</text>
    <text x="150" y="190" font-size="13" fill="#f6f6f6">PŘEHRÁVÁM...</text>

    <!-- spectrum -->
    <g fill="url(#bar)">
      <rect x="150" y="270" width="7" height="26"/>
      <rect x="159" y="258" width="7" height="38"/>
      <rect x="168" y="276" width="7" height="20"/>
      <rect x="177" y="246" width="7" height="50"/>
      <rect x="186" y="262" width="7" height="34"/>
      <rect x="195" y="252" width="7" height="44"/>
      <rect x="204" y="268" width="7" height="28"/>
      <rect x="213" y="256" width="7" height="40"/>
      <rect x="222" y="242" width="7" height="54"/>
      <rect x="231" y="264" width="7" height="32"/>
      <rect x="240" y="274" width="7" height="22"/>
      <rect x="249" y="238" width="7" height="58"/>
      <rect x="258" y="260" width="7" height="36"/>
      <rect x="267" y="272" width="7" height="24"/>
      <rect x="276" y="248" width="7" height="48"/>
      <rect x="285" y="240" width="7" height="56"/>
      <rect x="294" y="266" width="7" height="30"/>
      <rect x="303" y="254" width="7" height="42"/>
      <rect x="312" y="270" width="7" height="26"/>
      <rect x="321" y="276" width="7" height="20"/>
    </g>

    <!-- status bar -->
    <rect x="150" y="305" width="26" height="18" rx="2" fill="#1e5fd0"/>
    <text x="163" y="313" font-size="7" fill="#fff" text-anchor="middle" font-weight="700">MP3</text>
    <text x="163" y="320" font-size="7" fill="#fff" text-anchor="middle" font-weight="700">128</text>
    <text x="182" y="319" font-size="10" fill="#e8e8e8">PŘEHRÁVÁM..</text>
    <text x="300" y="319" font-size="10" fill="#f0b000">LIVE 50</text>
    <g fill="#7bc62d">
      <rect x="326" y="316" width="3" height="5"/>
      <rect x="331" y="313" width="3" height="8"/>
      <rect x="336" y="310" width="3" height="11"/>
    </g>
  </g>

  <!-- transport row -->
  <g fill="#444">
    <g transform="translate(178,388)"><path d="M14 0 L4 7 L14 14 Z"/><rect x="1" y="0" width="2.4" height="14" rx="1"/></g>
    <rect x="228" y="384" width="3" height="20" rx="1" fill="#7bc62d"/>
    <g transform="translate(268,388)"><path d="M0 0 L10 7 L0 14 Z"/><rect x="11.5" y="0" width="2.4" height="14" rx="1"/></g>
    <circle cx="330" cy="395" r="5" fill="#4ade80"/>
  </g>
</svg>
