services:
  backend:
    build: ./backend
    container_name: lara-backend
    restart: unless-stopped
    ports:
      - "8400:8400"
    env_file: .env
    environment:
      # Force Go's pure resolver — the musl/cgo resolver fails against
      # Docker's embedded DNS on some hosts (Synology NAS in particular),
      # which broke outbound stream/API lookups with "no such host".
      - GODEBUG=netdns=go
    volumes:
      - backend-data:/data
    depends_on:
      - bridge

  # Music bridge — YouTube Music / yt-dlp → MP3 stream LARA can play.
  # Works anonymously out of the box. For your own playlists/Premium,
  # create bridge/headers.txt (see bridge/headers.txt.example) and
  # uncomment the volume mount below.
  bridge:
    build: ./bridge
    container_name: lara-bridge
    restart: unless-stopped
    ports:
      # Host port is configurable (BRIDGE_PORT) in case 8282 is taken;
      # keep BRIDGE_LAN_URL in .env consistent with it.
      - "${BRIDGE_PORT:-8282}:8282"
    # volumes:
    #   - ./bridge/headers.txt:/app/headers.txt:ro

  frontend:
    build:
      context: ./frontend
      args:
        # Leave empty (default) to use same-origin /api via nginx — works
        # from any machine on your network with zero configuration.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    container_name: lara-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: lara-nginx
    restart: unless-stopped
    ports:
      - "8500:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  # OPTIONAL: Logitech Media Server — only needed if you want to use LARA
  # in Squeezebox "Audio Zone" mode instead of the direct binary protocol.
  # Start with: docker compose --profile lms up -d
  lms:
    image: jboesl/logitechmediaserver
    container_name: lara-lms
    profiles: ["lms"]
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Prague
    volumes:
      - lms-config:/var/lib/squeezeboxserver
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9001/status.html"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lms-config:
  backend-data:
