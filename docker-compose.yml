version: "3.9"

services:
  lms:
    image: jboesl/logitechmediaserver
    container_name: lara-lms
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Prague
    volumes:
      - lms-config:/var/lib/squeezeboxserver
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9001/status.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: lara-backend
    restart: unless-stopped
    ports:
      - "8400:8400"
    env_file: .env
    environment:
      - LMS_HOST=host-gateway
      - LMS_PORT=9001
      - LMS_CLI_PORT=9090
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - backend-data:/data
    depends_on:
      lms:
        condition: service_healthy

  bridge:
    build: ./bridge
    container_name: lara-bridge
    restart: unless-stopped
    ports:
      - "8282:8282"
    env_file: .env
    volumes:
      - bridge-cache:/cache

  frontend:
    build: ./frontend
    container_name: lara-frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: lara-nginx
    restart: unless-stopped
    ports:
      - "8500:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  lms-config:
  backend-data:
  bridge-cache:
